version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: agridemand_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: agridemand
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: agridemand_backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:password@mysql:3306/agridemand
    volumes:
      - .:/app
      - ./data:/app/data
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: .
    container_name: agridemand_frontend
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://backend:8000/api
    volumes:
      - .:/app
    depends_on:
      - backend

volumes:
  mysql_data:
